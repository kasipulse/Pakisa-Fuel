<!DOCTYPE html>
<html>
<head>
  <title>Pakisa Fuel</title>
</head>
<body>

<h2>Fuel Voucher</h2>

<select id="driver"></select>
<select id="vehicle"></select>
<input type="number" id="amount" placeholder="Amount">

<button onclick="createVoucher()">Generate</button>

<h1 id="code"></h1>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "fuel-management-system-7784c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function generateCode() {
  const d = new Date();
  const day = String(d.getDate()).padStart(2,'0');
  const month = String(d.getMonth()+1).padStart(2,'0');
  return `PKS-${day}${month}-${Math.floor(Math.random()*90000+10000)}`;
}

window.createVoucher = async function() {
  const driverId = document.getElementById("driver").value;
  const vehicleId = document.getElementById("vehicle").value;
  const amount = Number(document.getElementById("amount").value);

  const code = generateCode();

  await addDoc(collection(db, "fuel_vouchers"), {
    code,
    driverId,
    vehicleId,
    amountApproved: amount,
    status: "PENDING",
    createdAt: Timestamp.now()
  });

  document.getElementById("code").innerText = code;
}

// load drivers + vehicles
async function load() {
  const drivers = await getDocs(collection(db,"drivers"));
  drivers.forEach(d=>{
    driver.innerHTML += `<option value="${d.id}">${d.data().name}</option>`;
  });

  const vehicles = await getDocs(collection(db,"vehicles"));
  vehicles.forEach(v=>{
    vehicle.innerHTML += `<option value="${v.id}">${v.data().registration}</option>`;
  });
}

load();
</script>

</body>
</html>
